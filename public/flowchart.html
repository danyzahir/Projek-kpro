<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<title>Alur Proses (Flowchart) – Projek KPRO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha512-BNaRQnY9KRC7G7CQAY9as7kg93S39fSn0S6k61l/9QZt5mX+V9U0uD1/z6O1z8R0Q6f5J2g6z/6X4O0V6g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0f2f5;overflow:hidden;height:100vh}

/* TOOLBAR */
#toolbar{position:fixed;top:0;left:0;right:0;z-index:200;background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
#toolbar h1{font-size:15px;font-weight:700;color:#1e293b;margin-right:4px}
#toolbar span{font-size:11px;color:#94a3b8;margin-right:12px}
.tb-sep{width:1px;height:28px;background:#e2e8f0}
.tb-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #e2e8f0;background:#fff;color:#475569;transition:all .15s}
.tb-btn:hover{background:#f8fafc;border-color:#cbd5e1;color:#1e293b}
.tb-btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.tb-btn.primary:hover{background:#2563eb;border-color:#2563eb}
.tb-btn svg{width:14px;height:14px}

/* CANVAS WRAP */
#wrap{position:fixed;top:57px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;background:
  radial-gradient(circle,#d1d5db 1px,transparent 1px);background-size:24px 24px;background-color:#f8fafc}
#wrap.pan{cursor:grabbing}
#canvas{position:absolute;transform-origin:0 0;width:5000px;height:4000px;top:0;left:0}
svg#lines{position:absolute;top:0;left:0;width:5000px;height:4000px;pointer-events:all;overflow:visible}

/* FLOWCARD CARDS */
.tbl{position:absolute;background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.06);width:260px;transition:box-shadow .2s,border-color .2s;user-select:none;cursor:move}
.tbl:hover{box-shadow:0 6px 24px rgba(0,0,0,.12);border-color:#94a3b8}
.tbl.selected{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}

.tbl-head{padding:12px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f1f5f9;border-radius:12px 12px 0 0}
.tbl-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ic-start{background:linear-gradient(135deg,#94a3b8,#64748b);color:#fff}
.ic-process{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.ic-decision{background:linear-gradient(135deg,#06b6d4,#0ea5e9);color:#fff}
.ic-deploy{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.ic-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff}

.tbl-name{font-weight:700;font-size:13px;color:#1e293b;flex:1;line-height:1.2}
.tbl-badge{padding:3px 8px;border-radius:20px;font-size:9px;font-weight:800;letter-spacing:0.02em;margin-right:0}
.col-row{padding:12px 14px;font-size:12px;color:#475569;line-height:1.5}
.col-row strong{color:#0f172a}

/* PREVIEW MODAL */
#preview-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:700;display:none;align-items:center;justify-content:center;padding:40px;backdrop-filter:blur(4px)}
#preview-bg.show{display:flex}
#preview-modal{background:#fff;border-radius:18px;width:95%;max-width:1100px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,0.5)}
#pv-head{padding:18px 24px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;background:#f8fafc}
#pv-head h3{font-size:16px;font-weight:700;color:#1e293b}
#pv-body{flex:1;overflow:auto;padding:24px;background:#e5e7eb;display:flex;justify-content:center;align-items:flex-start}
#pv-img{box-shadow:0 10px 40px rgba(0,0,0,0.2);max-width:none;background:#fff}
#pv-foot{padding:16px 24px;border-top:1px solid #f1f5f9;display:flex;gap:12px;justify-content:flex-end;background:#fff}
.pv-btn{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #e2e8f0;transition:all .15s}
.pv-btn-primary{background:#3b82f6;color:#fff;border-color:#3b82f6}
.pv-btn-primary:hover{background:#2563eb}
.pv-hint{font-size:12px;color:#64748b;margin-right:auto;display:flex;align-items:center;gap:6px}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:10px;font-size:12px;z-index:900;opacity:0;transition:all .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LEGEND */
#legend{display:flex;align-items:center;gap:14px;margin-left:auto}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#64748b; background: #f8fafc; padding: 4px 10px; border-radius: 6px; border: 1px solid #e2e8f0;}
.leg-dot{width:8px;height:8px;border-radius:50%}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <h1>Alur Proses Bisnis</h1>
  <span>Cara Penggunaan Sistem</span>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="resetView()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    Reset Tampilan
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn primary" onclick="downloadPNG()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export Flowchart
  </button>
  <div id="legend">
    <div class="leg"><div class="leg-dot" style="background:#64748b"></div>Sistem/Awal</div>
    <div class="leg"><div class="leg-dot" style="background:#6366f1"></div>Planning (Rencana)</div>
    <div class="leg"><div class="leg-dot" style="background:#0ea5e9"></div>Validasi / Syarat</div>
    <div class="leg"><div class="leg-dot" style="background:#f59e0b"></div>Deployment (Pengerjaan)</div>
    <div class="leg"><div class="leg-dot" style="background:#10b981"></div>Selesai / Sukses</div>
  </div>
</div>

<!-- CANVAS -->
<div id="wrap">
  <div id="canvas">
    <svg id="lines"></svg>
  </div>
</div>

<!-- PREVIEW MODAL -->
<div id="preview-bg">
  <div id="preview-modal">
    <div id="pv-head">
      <h3>🖼️ Preview Ekspor Flowchart</h3>
      <button id="ep-close" onclick="closePreview()" style="font-size:18px;border:none;background:none;cursor:pointer;color:#94a3b8">×</button>
    </div>
    <div id="pv-body">
      <img id="pv-img" src="" alt="Pratinjau Flowchart"/>
    </div>
    <div id="pv-foot">
      <div class="pv-hint">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        Tips: Klik "Buka di Tab Baru" atau klik kanan pada gambar lalu pilih "Save Image As...".
      </div>
      <button class="pv-btn" onclick="closePreview()">Batal</button>
      <button class="pv-btn" id="pv-open-btn">Buka di Tab Baru</button>
      <button class="pv-btn pv-btn-primary" id="pv-download-btn">Simpan (Download)</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ═══════════ DATA FLOWCHART ═══════════
const nodes = [
  { id: 'n1', title: '1. Login ke Sistem', icon: '🔐', ic: 'ic-start', badge: 'START', bc: '#64748b', x: 400, y: 100, desc: 'Pengguna memasukkan NIK dan Password. Sistem akan mengecek hak akses/role (Admin/User).' },
  { id: 'n2', title: '2. Dashboard Utama', icon: '📊', ic: 'ic-process', badge: 'SISTEM', bc: '#8b5cf6', x: 400, y: 300, desc: 'Menampilkan ringkasan data progres, peta persebaran proyek, dan jumlah pesanan yang sedang diproses.' },
  { id: 'n3', title: '3. Input Perencanaan (Planning)', icon: '📝', ic: 'ic-process', badge: 'TAHAP 1', bc: '#8b5cf6', x: 400, y: 500, desc: 'User memasukkan data target pelanggan baru. Meliputi <b>Nama Mitra, Datel, Titik Koordinat</b> pelanggan.' },
  { id: 'n4', title: '4. Generate Tiket (Star Click ID)', icon: '🎟️', ic: 'ic-process', badge: 'SISTEM', bc: '#8b5cf6', x: 400, y: 700, desc: 'Sistem secara otomatis akan membuatkan Tiket (Star Click ID) sebagai identitas pesanan ini untuk dikerjakan.' },
  { id: 'n5', title: '5. Cek Alokasi / Validasi', icon: '🔎', ic: 'ic-decision', badge: 'CEK', bc: '#0ea5e9', x: 400, y: 900, desc: 'Sistem dan tim mengecek apakah lokasi memiliki infrastruktur yang memadai untuk dipasang.' },
  
  { id: 'n6', title: 'Order Dibatalkan', icon: '❌', ic: 'ic-start', badge: 'BATAL', bc: '#ef4444', x: 100, y: 900, desc: 'Jika jaringan penuh atau lokasi tidak terjangkau, order ditandai batal / tidak valid.' },
  
  { id: 'n7', title: '6. Order Valid (Siap Input Manual)', icon: '✅', ic: 'ic-decision', badge: 'VALID', bc: '#0ea5e9', x: 400, y: 1100, desc: 'Area terjangkau! Order kini bisa diproses oleh tim Deployment (Lapangan).' },
  { id: 'n8', title: '7. Manual Input Progress (Deployment)', icon: '👷', ic: 'ic-deploy', badge: 'TAHAP 2', bc: '#d97706', x: 400, y: 1300, desc: 'Membuat jadwal penugasan. Di sini, order dikaitkan ke mitra lapangan berdasarkan <b>Star Click ID</b> yang dibuat di awal.' },
  { id: 'n9', title: '8. Pengerjaan Lapangan', icon: '🔧', ic: 'ic-deploy', badge: 'MITRA', bc: '#d97706', x: 800, y: 1300, desc: 'Mitra turun ke lapangan untuk menarik kabel / memasang perangkat ke rumah pelanggan.' },
  { id: 'n10', title: '9. Ada Kendala?', icon: '⚠️', ic: 'ic-decision', badge: 'CEK', bc: '#0ea5e9', x: 800, y: 1540, desc: 'Jika saat pasang ada tiang rubuh, pelanggan tidak ada di rumah, atau kabel putus, mitra melapor kendala.' },
  { id: 'n11', title: 'Log Progress (Kendala / Pending)', icon: '📜', ic: 'ic-deploy', badge: 'LOG', bc: '#d97706', x: 400, y: 1540, desc: 'Status order berubah menjadi KENDALA beserta catatan foto lapangan.' },
  { id: 'n12', title: '10. Instalasi Berhasil (Go-Live)', icon: '🎉', ic: 'ic-success', badge: 'SELESAI', bc: '#10b981', x: 800, y: 1740, desc: 'Pemasangan selesai. Pelanggan bisa menikmati layanan. Order ditandai sukses.' },
];

const paths = [
  { from: 'n1', to: 'n2', label: 'Login Sukses' },
  { from: 'n2', to: 'n3', label: 'Pilih Menu Planning' },
  { from: 'n3', to: 'n4', label: 'Simpan Data' },
  { from: 'n4', to: 'n5', label: 'Proses Alokasi' },
  { from: 'n5', to: 'n6', label: 'Tidak Valid' },
  { from: 'n5', to: 'n7', label: 'Infrastruktur Siap' },
  { from: 'n7', to: 'n8', label: 'Gunakan Star Click ID' },
  { from: 'n8', to: 'n9', label: 'Tugaskan Mitra' },
  { from: 'n9', to: 'n10', label: 'Proses Pasang' },
  { from: 'n10', to: 'n11', label: 'Ya, Ada Kendala' },
  { from: 'n11', to: 'n9', label: 'Perbaikan / Retugas' },
  { from: 'n10', to: 'n12', label: 'Lancar / Tuntas' },
  { from: 'n2', to: 'n8', label: 'Pilih Menu Deployment', isCurve: true } // Langsung ke tahap pengerjaan
];

// ═══════════ STATE ═══════════
const canvas   = document.getElementById('canvas');
const svg      = document.getElementById('lines');
const wrap     = document.getElementById('wrap');
let els        = {};
let pos        = {};
let panX=0, panY=0, scale=0.85;
let dragging   = null, dragOX=0, dragOY=0;
let panning    = false, lastMouse={};

// ═══════════ RENDER NODES ═══════════
function renderNode(t) {
  const el = document.createElement('div');
  el.className = 'tbl';
  el.id = 'N_' + t.id;
  el.style.left = t.x + 'px';
  el.style.top  = t.y + 'px';
  pos[t.id] = {x:t.x, y:t.y};

  const bs = `background:${t.bc}22;color:${t.bc};border:1px solid ${t.bc}55;`;

  el.innerHTML = `
    <div class="tbl-head" data-id="${t.id}">
      <div class="tbl-icon ${t.ic}">${t.icon}</div>
      <div class="tbl-name">${t.title}</div>
      <span class="tbl-badge" style="${bs}">${t.badge}</span>
    </div>
    <div class="col-row">${t.desc}</div>`;

  canvas.appendChild(el);
  els[t.id] = el;

  // drag
  el.addEventListener('mousedown', e => {
    dragging = {id:t.id, el};
    const r = el.getBoundingClientRect();
    dragOX = (e.clientX - r.left)/scale;
    dragOY = (e.clientY - r.top)/scale;
    el.classList.add('selected');
    e.stopPropagation(); e.preventDefault();
  });
}

function renderAll() {
  canvas.querySelectorAll('.tbl').forEach(e=>e.remove());
  els={}; pos={};
  nodes.forEach(renderNode);
  
  // Center view on the first node
  if (nodes.length > 0) {
      const wrapR = wrap.getBoundingClientRect();
      panX = -nodes[0].x * scale + wrapR.width / 2 - 130 * scale;
      panY = -nodes[0].y * scale + 50; 
  }
  
  drawLines();
}

// ═══════════ LINES ═══════════
function drawLines() {
  svg.innerHTML='';
  paths.forEach((p,i) => {
    const fe=els[p.from], te=els[p.to];
    if(!fe||!te) return;

    // Calculate center points of rectangles
    const fx = pos[p.from].x + fe.offsetWidth/2;
    const fy = pos[p.from].y + fe.offsetHeight/2;
    const tx = pos[p.to].x + te.offsetWidth/2;
    const ty = pos[p.to].y + te.offsetHeight/2;

    // Determine edge attachment points (very basic routing)
    let x1=fx, y1=fy, x2=tx, y2=ty;
    
    // Vertical connection predominately
    if (Math.abs(ty - fy) > Math.abs(tx - fx)) {
        y1 = ty > fy ? pos[p.from].y + fe.offsetHeight : pos[p.from].y;
        y2 = ty > fy ? pos[p.to].y : pos[p.to].y + te.offsetHeight;
        // Adjust x if boxes aren't perfectly aligned but close enough
        if (Math.abs(tx - fx) < 100) { x1 = x2 = (fx + tx) / 2; }
    } else { // Horizontal
        x1 = tx > fx ? pos[p.from].x + fe.offsetWidth : pos[p.from].x;
        x2 = tx > fx ? pos[p.to].x : pos[p.to].x + te.offsetWidth;
        if (Math.abs(ty - fy) < 100) { y1 = y2 = (fy + ty) / 2; }
    }

    // Dynamic curve
    let d = '';
    if (p.isCurve) {
       // Deep curve for side-skipping lines
       const cx1 = x1 + 300;
       const cy1 = y1;
       const cx2 = x2 + 300;
       const cy2 = y2;
       d = `M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`;
    } else {
       // Standard smooth curve
       const isVertical = Math.abs(ty - fy) > Math.abs(tx - fx);
       if (isVertical) {
           const cy = (y1 + y2) / 2;
           d = `M${x1},${y1} C${x1},${cy} ${x2},${cy} ${x2},${y2}`;
       } else {
           const cx = (x1 + x2) / 2;
           d = `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`;
       }
    }

    const color = '#94a3b8';
    
    const lblW = p.label ? p.label.length * 6 + 16 : 0;
    
    // Label positioning (approximate middle of the curve)
    let mx, my;
    if (p.isCurve) {
        mx = (x1 + x2) / 2 + 220; my = (y1 + y2) / 2;
    } else {
        mx = (x1 + x2) / 2; my = (y1 + y2) / 2;
    }

    svg.innerHTML += `
      <defs>
        <marker id="arr${i}" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
          <path d="M0,0 L0,8 L10,4z" fill="${color}"/>
        </marker>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
        </filter>
      </defs>
      
      <path d="${d}" stroke="${color}" stroke-width="2.5" fill="none" marker-end="url(#arr${i})"></path>
      
      ${p.label ? `
      <rect x="${mx-lblW/2}" y="${my-12}" width="${lblW}" height="24" rx="12"
        fill="#ffffff" stroke="${color}" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="${mx}" y="${my+3}" text-anchor="middle" fill="#475569" font-size="10" font-weight="600" font-family="'Inter',sans-serif">${p.label}</text>
      ` : ''}
    `;
  });
}

// ═══════════ PAN & ZOOM ═══════════
function applyTransform(){ canvas.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`; }
function resetView(){ 
    if (nodes.length > 0) {
      const wrapR = wrap.getBoundingClientRect();
      panX = -nodes[0].x * 0.85 + wrapR.width / 2 - 130 * 0.85;
      panY = -nodes[0].y * 0.85 + 50; 
      scale = 0.85;
      applyTransform();
    }
}

wrap.addEventListener('mousedown', e => {
  if(e.target===wrap||e.target===canvas||e.target===svg||e.target.tagName==='path'){
    panning=true; lastMouse={x:e.clientX,y:e.clientY}; wrap.classList.add('pan');
  }
});
document.addEventListener('mousemove', e => {
  if(dragging){
    const wr=wrap.getBoundingClientRect();
    const x=(e.clientX-wr.left-panX)/scale-dragOX;
    const y=(e.clientY-wr.top-panY)/scale-dragOY;
    dragging.el.style.left=x+'px'; dragging.el.style.top=y+'px';
    pos[dragging.id]={x,y}; drawLines(); return;
  }
  if(panning){
    panX+=e.clientX-lastMouse.x; panY+=e.clientY-lastMouse.y;
    lastMouse={x:e.clientX,y:e.clientY}; applyTransform();
  }
});
document.addEventListener('mouseup',()=>{
  if(dragging){dragging.el.classList.remove('selected');dragging=null;}
  panning=false; wrap.classList.remove('pan');
});
wrap.addEventListener('wheel', e=>{
  e.preventDefault();
  const d=e.deltaY>0?0.92:1.08;
  scale=Math.min(Math.max(scale*d,0.2),2.5);
  applyTransform();
},{passive:false});

// ═══════════ EXPORT ═══════════
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

function downloadPNG() {
  if (typeof html2canvas === 'undefined') {
    alert("Proses belum siap, tunggu sebentar lalu coba lagi (memuat library).");
    return;
  }

  toast('Sedang memproses gambar (mohon tunggu)...');
  const allTbls = Object.values(els);
  if(allTbls.length===0){ toast('Diagram kosong!'); return; }

  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  allTbls.forEach(el=>{
    const id=el.id.replace('N_','');
    const p=pos[id]; if(!p) return;
    minX=Math.min(minX,p.x); minY=Math.min(minY,p.y);
    maxX=Math.max(maxX,p.x+el.offsetWidth); maxY=Math.max(maxY,p.y+el.offsetHeight);
  });
  const pad=80;
  const W=(maxX-minX)+pad*2, H=(maxY-minY)+pad*2;

  const prevScale=scale, prevX=panX, prevY=panY;
  scale=1; panX=(-minX+pad); panY=(-minY+pad);
  applyTransform();

  setTimeout(()=>{
    const captureTarget = document.getElementById('canvas');
    html2canvas(captureTarget, {
      width: W, height: H,
      scrollX: -window.scrollX, scrollY: -window.scrollY,
      windowWidth: document.documentElement.offsetWidth, windowHeight: document.documentElement.offsetHeight,
      backgroundColor: '#f8fafc', scale: 2, useCORS: true,
      onclone: (clonedDoc) => {
        const c = clonedDoc.getElementById('canvas');
        c.style.transform = 'none'; c.style.left = '0'; c.style.top = '0';
      }
    }).then(cv => {
      scale=prevScale; panX=prevX; panY=prevY; applyTransform();
      
      cv.toBlob((blob) => {
        if (!blob || blob.size < 2000) return alert("Gagal memproses gambar.");

        const url = URL.createObjectURL(blob);
        document.getElementById('pv-img').src = url;
        document.getElementById('preview-bg').classList.add('show');
        
        document.getElementById('pv-download-btn').onclick = () => {
          const a = document.createElement('a');
          a.href = url; a.download = 'Flowchart_Projek_KPRO.png';
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
        };
        document.getElementById('pv-open-btn').onclick = () => {
          window.open(url, '_blank');
        };
      }, 'image/png', 1.0);
    }).catch(err => {
      scale=prevScale; panX=prevX; panY=prevY; applyTransform();
      console.error(err); alert("Gagal mengambil gambar.");
    });
  }, 650);
}

function closePreview() {
  const bg = document.getElementById('preview-bg');
  const img = document.getElementById('pv-img');
  if (img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);
  bg.classList.remove('show');
}

// ═══════════ INIT ═══════════
renderAll();
</script>
</body>
